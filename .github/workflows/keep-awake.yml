name: Keep Streamlit App Awake

on:
  schedule:
    - cron: '*/10 * * * *'     # Her 10 dakikada bir (önerilen)
  workflow_dispatch:           # Manuel çalıştırmak istersen

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    
    steps:
      - name: Ping Streamlit App (Keep Alive)
        run: |
          curl -I -m 15 -f -s https://matematik-matematik.streamlit.app/ || echo "Ping failed but workflow continues"
        shell: bash
